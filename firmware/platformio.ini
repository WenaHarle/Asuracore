; AsuraCore PlatformIO Configuration
; Supports ESP32 and ESP8266 boards

[platformio]
default_envs = widget_test

[env]
lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0
monitor_speed = 115200
upload_speed = 921600

; =============================================================================
; Widget Test Program (Recommended for testing)
; =============================================================================

[env:widget_test]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<../widget_test/>

; =============================================================================
; ESP32 Configurations
; =============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<../asuracore_device/>

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
build_src_filter = +<../asuracore_device/>

[env:esp32-s2]
platform = espressif32
board = esp32-s2-saola-1
framework = arduino
build_src_filter = +<../asuracore_device/>

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_src_filter = +<../asuracore_device/>

; =============================================================================
; ESP8266 Configurations
; =============================================================================

[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino
build_src_filter = +<../asuracore_esp8266/>

[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino
build_src_filter = +<../asuracore_esp8266/>

[env:d1_mini_pro]
platform = espressif8266
board = d1_mini_pro
framework = arduino
build_src_filter = +<../asuracore_esp8266/>
